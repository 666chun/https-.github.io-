<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给你的心动告白</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: radial-gradient(circle at center, #2b0a1a 0%, #12040b 45%, #000 100%);
      font-family: "Microsoft YaHei", sans-serif;
      height: 100vh;
      color: white;
    }

    #bgCanvas {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 0;
    }

    .center-box {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
      width: 90%;
      max-width: 900px;
    }

    .heart-wrap {
      position: relative;
      width: 260px;
      height: 240px;
      margin: 0 auto 30px;
      animation: beat 1.2s infinite ease-in-out;
      filter: drop-shadow(0 0 20px rgba(255, 80, 120, 0.6))
              drop-shadow(0 0 50px rgba(255, 80, 120, 0.35));
    }

    .heart {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, #ff2d55, #ff6b81);
      transform: translate(-50%, -35%) rotate(45deg);
      border-radius: 18px;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, #ff2d55, #ff6b81);
      border-radius: 50%;
    }

    .heart::before {
      left: -70px;
      top: 0;
    }

    .heart::after {
      left: 0;
      top: -70px;
    }

    .heart-glow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 170px;
      height: 170px;
      transform: translate(-50%, -38%) rotate(45deg);
      border-radius: 24px;
      border: 2px solid rgba(255, 200, 220, 0.55);
      animation: pulseGlow 1.2s infinite ease-in-out;
    }

    .heart-glow::before,
    .heart-glow::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 2px solid rgba(255, 200, 220, 0.55);
    }

    .heart-glow::before {
      left: -85px;
      top: 0;
    }

    .heart-glow::after {
      left: 0;
      top: -85px;
    }

    .title {
      font-size: 42px;
      font-weight: 700;
      color: #ffd6df;
      text-shadow: 0 0 10px rgba(255,255,255,0.15), 0 0 25px rgba(255,120,160,0.35);
      min-height: 60px;
      letter-spacing: 2px;
    }

    .subtitle {
      margin-top: 16px;
      font-size: 24px;
      color: #ffc2d1;
      opacity: 0.95;
      min-height: 34px;
    }

    .tip {
      margin-top: 28px;
      font-size: 16px;
      color: rgba(255, 230, 235, 0.82);
      letter-spacing: 1px;
    }

    .cursor {
      display: inline-block;
      width: 1ch;
      animation: blink 0.8s infinite;
    }

    .floating-love {
      position: absolute;
      font-size: 20px;
      color: rgba(255, 190, 210, 0.75);
      animation: floatUp linear forwards;
      pointer-events: none;
      z-index: 1;
      text-shadow: 0 0 10px rgba(255, 100, 130, 0.4);
    }

    @keyframes beat {
      0%, 100% {
        transform: scale(1);
      }
      25% {
        transform: scale(1.08);
      }
      40% {
        transform: scale(0.98);
      }
      60% {
        transform: scale(1.12);
      }
    }

    @keyframes pulseGlow {
      0%, 100% {
        opacity: 0.55;
        transform: translate(-50%, -38%) rotate(45deg) scale(1);
      }
      50% {
        opacity: 0.9;
        transform: translate(-50%, -38%) rotate(45deg) scale(1.08);
      }
    }

    @keyframes blink {
      0%, 50% {
        opacity: 1;
      }
      51%, 100% {
        opacity: 0;
      }
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translateY(-180px) scale(1.3);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="center-box">
    <div class="heart-wrap">
      <div class="heart-glow"></div>
      <div class="heart"></div>
    </div>

    <div class="title">
      <span id="typing1"></span><span class="cursor">|</span>
    </div>

    <div class="subtitle" id="typing2"></div>

    <div class="tip">❤ 勇往直前，未来可期 ❤</div>
  </div>

  <script>
    // ========= 可改内容 =========
    const nameText = "王馨怡，天天开心";
    const subText = "一起走花路吧";
    // ===========================

    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    window.addEventListener("resize", () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      createRain();
    });

    // 背景爱心雨
    const hearts = [];
    function createRain() {
      hearts.length = 0;
      const count = Math.max(40, Math.floor(w / 30));
      for (let i = 0; i < count; i++) {
        hearts.push({
          x: Math.random() * w,
          y: Math.random() * h,
          size: 10 + Math.random() * 20,
          speed: 1 + Math.random() * 2.8,
          drift: -0.8 + Math.random() * 1.6,
          alpha: 0.2 + Math.random() * 0.6
        });
      }
    }

    function drawHeartShape(x, y, size, alpha) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(size / 18, size / 18);
      ctx.beginPath();
      for (let t = 0; t < Math.PI * 2; t += 0.05) {
        const hx = 16 * Math.pow(Math.sin(t), 3);
        const hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        if (t === 0) ctx.moveTo(hx, hy);
        else ctx.lineTo(hx, hy);
      }
      ctx.closePath();
      ctx.fillStyle = `rgba(255, 90, 130, ${alpha})`;
      ctx.shadowColor = "rgba(255, 100, 140, 0.45)";
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.restore();
    }

    function animateRain() {
      ctx.clearRect(0, 0, w, h);

      for (const heart of hearts) {
        drawHeartShape(heart.x, heart.y, heart.size, heart.alpha);
        heart.y += heart.speed;
        heart.x += heart.drift;

        if (heart.y > h + 30) {
          heart.y = -30;
          heart.x = Math.random() * w;
        }
        if (heart.x < -30) heart.x = w + 30;
        if (heart.x > w + 30) heart.x = -30;
      }

      requestAnimationFrame(animateRain);
    }

    createRain();
    animateRain();

    // 打字机效果
    function typeWriter(el, text, speed, callback) {
      let index = 0;
      function type() {
        if (index <= text.length) {
          el.textContent = text.slice(0, index);
          index++;
          setTimeout(type, speed);
        } else if (callback) {
          callback();
        }
      }
      type();
    }

    const typing1 = document.getElementById("typing1");
    const typing2 = document.getElementById("typing2");

    typeWriter(typing1, nameText, 140, () => {
      setTimeout(() => {
        typeWriter(typing2, subText, 70);
      }, 300);
    });

    // 底部随机飘字小爱心
    function spawnFloatingLove() {
      const item = document.createElement("div");
      item.className = "floating-love";
      item.textContent = Math.random() > 0.5 ? "❤" : "LOVE";
      item.style.left = Math.random() * window.innerWidth + "px";
      item.style.bottom = "20px";
      item.style.fontSize = (16 + Math.random() * 20) + "px";
      item.style.animationDuration = (2.5 + Math.random() * 2.5) + "s";
      document.body.appendChild(item);

      setTimeout(() => {
        item.remove();
      }, 5000);
    }

    setInterval(spawnFloatingLove, 450);
  </script>
</body>
</html>
